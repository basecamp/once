name: Release

permissions: {}

on:
  push:
    tags: [ "v*" ]

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5.6.0 # zizmor: ignore[cache-poisoning] -- cache is branch-isolated; fork PRs cannot write to this cache
      with:
        go-version-file: go.mod

    - name: Build release artifacts
      run: make dist

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        gh release create "${GITHUB_REF_NAME}"
        dist/*
        --title "Release ${GITHUB_REF_NAME}"
